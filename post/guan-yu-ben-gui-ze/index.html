              <p>这是一个叫做派珞蒙的魔法的世界，只不过现在出了点小问题——<br>
那些不懂魔法的人太聪明了！<br>
于是，蒸汽动力取代了魔法，派珞蒙世界进入了工业时代。<br>
在派珞蒙，你们可以扮演幽居在小巷里的魔法使，也可以是工业大学毕业的新人技师，<br>
创建侦探事务所，或者当个探险家前往新大陆，<br>
一切皆有可能.一切都取决于你们。</p>
